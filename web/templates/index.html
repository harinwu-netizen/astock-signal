<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏮 A股信号灯 - 仪表盘</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { color: #58a6ff; margin-bottom: 20px; }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .card h2 { color: #8b949e; font-size: 14px; margin-bottom: 12px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
        .stat { padding: 12px; background: #21262d; border-radius: 6px; }
        .stat-value { font-size: 24px; font-weight: bold; color: #58a6ff; }
        .stat-label { font-size: 12px; color: #8b949e; margin-top: 4px; }
        .positive { color: #3fb950; }
        .negative { color: #f85149; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #30363d; }
        th { color: #8b949e; font-weight: normal; font-size: 12px; }
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        .tag-green { background: #238636; color: #fff; }
        .tag-red { background: #da3633; color: #fff; }
        .tag-yellow { background: #9e6a03; color: #fff; }
        .tag-gray { background: #484f58; color: #fff; }
        .btn {
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary { background: #238636; color: #fff; }
        .btn-danger { background: #da3633; color: #fff; }
        .refresh { float: right; font-size: 12px; color: #8b949e; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏮 A股信号灯</h1>
            <span class="refresh" id="update-time"></span>
        </div>

        <!-- 账户总览 -->
        <div class="card">
            <h2>📊 账户总览</h2>
            <div class="grid">
                <div class="stat">
                    <div class="stat-value" id="total-value">--</div>
                    <div class="stat-label">总市值</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="total-pnl">--</div>
                    <div class="stat-label">总盈亏</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="available-cash">--</div>
                    <div class="stat-label">可用资金</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="position-count">--</div>
                    <div class="stat-label">持仓数/最大</div>
                </div>
            </div>
        </div>

        <!-- 大盘状态 -->
        <div class="card">
            <h2>🌏 大盘状态</h2>
            <div class="grid">
                <div class="stat">
                    <div class="stat-value" id="market-status">--</div>
                    <div class="stat-label">市场状态</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="market-change">--</div>
                    <div class="stat-label">上证涨跌幅</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="signal-summary">--</div>
                    <div class="stat-label">信号概览</div>
                </div>
            </div>
        </div>

        <!-- 持仓列表 -->
        <div class="card">
            <h2>💼 持仓 (<span id="positions-count">0</span>)</h2>
            <table>
                <thead>
                    <tr>
                        <th>股票</th>
                        <th>成本</th>
                        <th>现价</th>
                        <th>盈亏</th>
                        <th>止损</th>
                        <th>信号</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="positions-tbody">
                    <tr><td colspan="7" style="text-align:center;color:#8b949e">加载中...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- 信号列表 -->
        <div class="card">
            <h2>📈 信号 (<span id="signals-count">0</span>)</h2>
            <table>
                <thead>
                    <tr>
                        <th>股票</th>
                        <th>价格</th>
                        <th>涨跌</th>
                        <th>买点</th>
                        <th>卖点</th>
                        <th>决策</th>
                    </tr>
                </thead>
                <tbody id="signals-tbody">
                    <tr><td colspan="6" style="text-align:center;color:#8b949e">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API = '';

        async function loadPortfolio() {
            try {
                const res = await fetch(API + '/api/portfolio');
                const data = await res.json();
                document.getElementById('total-value').textContent = '¥' + data.total_value.toLocaleString('zh-CN', {minimumFractionDigits: 0});
                const pnlEl = document.getElementById('total-pnl');
                pnlEl.textContent = (data.total_pnl >= 0 ? '+' : '') + data.total_pnl.toLocaleString('zh-CN') + ' (' + data.total_pnl_pct.toFixed(2) + '%)';
                pnlEl.className = 'stat-value ' + (data.total_pnl >= 0 ? 'positive' : 'negative');
                document.getElementById('available-cash').textContent = '¥' + data.available_cash.toLocaleString('zh-CN', {minimumFractionDigits: 0});
                document.getElementById('position-count').textContent = data.position_count + '/' + data.max_positions;
            } catch(e) { console.error(e); }
        }

        async function loadMarket() {
            try {
                const res = await fetch(API + '/api/market');
                const data = await res.json();
                document.getElementById('market-status').textContent = data.status;
                const chgEl = document.getElementById('market-change');
                chgEl.textContent = data.change_pct + '%';
                chgEl.className = 'stat-value ' + (data.change_pct >= 0 ? 'positive' : 'negative');
            } catch(e) { console.error(e); }
        }

        async function loadPositions() {
            try {
                const res = await fetch(API + '/api/positions');
                const data = await res.json();
                document.getElementById('positions-count').textContent = data.count;
                const tbody = document.getElementById('positions-tbody');
                if (data.positions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#8b949e">暂无持仓</td></tr>';
                    return;
                }
                tbody.innerHTML = data.positions.map(p => {
                    const pnl = p.pnl_pct >= 0 ? 'positive' : 'negative';
                    const signals = `买${p.latest_buy_signals}/卖${p.latest_sell_signals}`;
                    return `<tr>
                        <td><b>${p.name}</b><br><span style="color:#8b949e;font-size:12px">${p.code}</span></td>
                        <td>¥${p.buy_price.toFixed(2)}</td>
                        <td>¥${p.current_price.toFixed(2)}</td>
                        <td class="${pnl}">${p.unrealized_pnl >= 0 ? '+' : ''}${p.unrealized_pnl.toFixed(0)} (${p.pnl_pct.toFixed(2)}%)</td>
                        <td>¥${p.stop_loss.toFixed(2)}</td>
                        <td>${signals}</td>
                        <td><span class="tag tag-green">持仓中</span></td>
                    </tr>`;
                }).join('');
            } catch(e) { console.error(e); }
        }

        async function loadSignals() {
            try {
                const res = await fetch(API + '/api/signals');
                const data = await res.json();
                document.getElementById('signals-count').textContent = data.summary.total;
                document.getElementById('signal-summary').textContent = '🟢' + data.summary.buy_count + ' 🔴' + data.summary.sell_count;
                const tbody = document.getElementById('signals-tbody');
                if (data.signals.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#8b949e">暂无信号</td></tr>';
                    return;
                }
                tbody.innerHTML = data.signals.map(s => {
                    const tag = s.decision === 'BUY' ? 'tag-green' : s.decision === 'SELL' ? 'tag-red' : s.decision === 'HOLD' ? 'tag-yellow' : 'tag-gray';
                    const chgClass = s.change_pct >= 0 ? 'positive' : 'negative';
                    return `<tr>
                        <td><b>${s.name}</b><br><span style="color:#8b949e;font-size:12px">${s.code}</span></td>
                        <td>¥${s.price.toFixed(2)}</td>
                        <td class="${chgClass}">${s.change_pct >= 0 ? '+' : ''}${s.change_pct.toFixed(2)}%</td>
                        <td>${s.buy_count}/10</td>
                        <td>${s.sell_count}/6</td>
                        <td><span class="tag ${tag}">${s.decision}</span></td>
                    </tr>`;
                }).join('');
            } catch(e) { console.error(e); }
        }

        async function loadAll() {
            await Promise.all([loadPortfolio(), loadMarket(), loadPositions(), loadSignals()]);
            document.getElementById('update-time').textContent = '更新: ' + new Date().toLocaleTimeString('zh-CN');
        }

        loadAll();
        setInterval(loadAll, 60000); // 每分钟刷新
    </script>
</body>
</html>
